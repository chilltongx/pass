<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pass Relay</title>
    <link rel="icon" href="/pass.ico" sizes="any">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Pass Relay">
        <div>
          <p class="eyebrow">Private Relay</p>
          <h1>Pass</h1>
        </div>
        <div class="topbar-actions">
          <button class="tool-button" id="fileManagerButton" type="button">文件</button>
          <button class="tool-button danger-tool" id="cleanupPanelButton" type="button">清理</button>
          <button class="icon-button" id="refreshButton" type="button" title="刷新">
            <span aria-hidden="true">↻</span>
          </button>
        </div>
      </section>

      <section class="composer" aria-label="发送内容">
        <div class="tabs" role="tablist" aria-label="发送类型">
          <button class="tab active" type="button" data-panel="textPanel">文字</button>
          <button class="tab" type="button" data-panel="filePanel">文件</button>
        </div>

        <div class="panel active" id="textPanel">
          <textarea id="textInput" rows="5" placeholder="粘贴文字、链接、验证码或笔记"></textarea>
          <button class="primary" id="sendTextButton" type="button">发送文字</button>
        </div>

        <div class="panel" id="filePanel">
          <label class="dropzone" for="fileInput" id="dropzone">
            <input id="fileInput" type="file" multiple>
            <span class="drop-title">选择图片或文件</span>
            <span class="drop-subtitle">也可以拖放到这里</span>
          </label>
          <div class="queue" id="queue"></div>
        </div>
      </section>

      <section class="history" aria-label="接收记录">
        <div class="section-title">
          <h2>最近传输</h2>
          <span id="status">准备就绪</span>
        </div>
        <div class="items" id="items"></div>
      </section>

    </main>

    <section class="cleanup-dialog" id="cleanupDialog" aria-label="清理记录" hidden>
      <div class="cleanup-shell">
        <header class="cleanup-header">
          <div>
            <p class="eyebrow">Cleanup</p>
            <h2>清理记录</h2>
          </div>
          <button class="icon-button" id="cleanupClose" type="button" title="关闭">×</button>
        </header>
        <div class="cleanup-body">
          <p>选择日期范围后，会删除范围内的文字和文件。开始和结束当天都会包含在内。</p>
          <div class="cleanup-form">
            <label>
              <span>开始日期</span>
              <input id="cleanupStart" type="date">
            </label>
            <label>
              <span>结束日期</span>
              <input id="cleanupEnd" type="date">
            </label>
            <button class="danger" id="cleanupButton" type="button">清理</button>
          </div>
        </div>
      </div>
    </section>

    <section class="file-explorer" id="fileExplorer" aria-label="文件管理" hidden>
      <div class="explorer-shell">
        <header class="explorer-header">
          <div>
            <p class="eyebrow">File Manager</p>
            <h2>文件管理</h2>
          </div>
          <div class="explorer-header-actions">
            <span id="fileManagerSummary">0 个文件</span>
            <button class="icon-button" id="fileExplorerClose" type="button" title="关闭">×</button>
          </div>
        </header>

        <div class="explorer-body">
          <aside class="explorer-sidebar" id="fileManagerFolders" aria-label="文件夹"></aside>

          <section class="explorer-main" aria-label="文件列表">
            <div class="explorer-toolbar">
              <div class="breadcrumb" id="fileManagerBreadcrumb">全部文件</div>
              <label class="search-field">
                <span>搜索</span>
                <input id="fileSearch" type="search" placeholder="文件名">
              </label>
            </div>
            <div class="explorer-list-header" aria-hidden="true">
              <span>名称</span>
              <span>日期</span>
              <span>操作</span>
            </div>
            <div class="file-manager" id="fileManager"></div>
          </section>
        </div>
      </div>
    </section>

    <template id="textTemplate">
      <article class="item">
        <div class="item-main">
          <div class="badge">文字</div>
          <p class="content"></p>
          <time></time>
        </div>
        <div class="actions">
          <button type="button" data-action="copy">复制</button>
          <button type="button" data-action="delete">删除</button>
        </div>
      </article>
    </template>

    <template id="fileTemplate">
      <article class="item">
        <div class="thumb"></div>
        <div class="item-main">
          <div class="badge">文件</div>
          <p class="filename"></p>
          <time></time>
        </div>
        <div class="actions">
          <a data-action="download">下载</a>
          <button type="button" data-action="delete">删除</button>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
